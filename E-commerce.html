<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Souled Store</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #e8e3d9; /* Beige background */
}

header {
    background: #5c5c5c; /* Grey header */
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header input {
    padding: 6px;
    border-radius: 4px;
    border: none;
}

.container {
    display: flex;
    padding: 20px;
}

aside {
    width: 250px;
    background: #d6d3cd; /* Soft grey-beige */
    padding: 15px;
    border-radius: 8px;
}

main {
    flex: 1;
    margin-left: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
}

.product {
    background: #ffffff;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    transition: transform 0.2s ease;
}

.product:hover {
    transform: scale(1.03);
}

.product img {
    width: 100%;
    border-radius: 6px;
}

button {
    background: #5c5c5c;
    color: white;
    border: none;
    padding: 8px 10px;
    margin-top: 8px;
    cursor: pointer;
    border-radius: 4px;
}

button:hover {
    background: #3f3f3f;
}

select, input[type="range"] {
    width: 100%;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
    <h1>🛍 Souled Store</h1>
    <div>
        <input type="search" id="searchInput" placeholder="Search products...">
        <button onclick="filterProducts()">Search</button>
    </div>
</header>

<div class="container">
    <aside>
        <h2>Filters</h2>

        <h4>Max Price: $<span id="priceValue">500</span></h4>
        <input type="range" id="priceRange" min="0" max="500" value="500" step="50" oninput="updatePrice()">

        <h4>Color</h4>
        <label><input type="checkbox" value="Black" class="color"> Black</label><br>
        <label><input type="checkbox" value="Blue" class="color"> Blue</label><br>
        <label><input type="checkbox" value="White" class="color"> White</label>

        <h4>Brand</h4>
        <select id="brandSelect" multiple>
            <option>Souled Originals</option>
            <option>Urban Wear</option>
            <option>Street Mode</option>
            <option>Classic Co.</option>
        </select>

        <h4>Rating</h4>
        <label><input type="radio" name="rating" value="4"> 4★ & up</label><br>
        <label><input type="radio" name="rating" value="3"> 3★ & up</label>

        <br><br>
        <button onclick="filterProducts()">Apply Filters</button>
    </aside>

    <main>
        <h2>Products</h2>
        <label>Sort by: </label>
        <select id="sortSelect" onchange="sortProducts()">
            <option value="default">Default</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
        </select>

        <div class="products" id="productList"></div>
    </main>
</div>

<script>
const products = [
    {name:"Graphic Oversized Tee", brand:"Souled Originals", color:"Black", price:120, rating:4.2, img:"https://via.placeholder.com/200"},
    {name:"Minimal Beige Shirt", brand:"Classic Co.", color:"White", price:90, rating:3.9, img:"https://via.placeholder.com/200"},
    {name:"Street Denim Jacket", brand:"Urban Wear", color:"Blue", price:220, rating:4.6, img:"https://via.placeholder.com/200"},
    {name:"Casual Summer Tee", brand:"Street Mode", color:"White", price:140, rating:4.1, img:"https://via.placeholder.com/200"},
    {name:"Urban Cargo Pants", brand:"Urban Wear", color:"Black", price:180, rating:4.3, img:"https://via.placeholder.com/200"},
    {name:"Classic Polo T-Shirt", brand:"Classic Co.", color:"White", price:110, rating:3.7, img:"https://via.placeholder.com/200"},
    {name:"Blue Washed Jeans", brand:"Street Mode", color:"Blue", price:200, rating:4.4, img:"https://via.placeholder.com/200"},
    {name:"Printed Hoodie", brand:"Souled Originals", color:"Black", price:250, rating:4.8, img:"https://via.placeholder.com/200"},
    {name:"Basic White Sneakers", brand:"Classic Co.", color:"White", price:300, rating:4.5, img:"https://via.placeholder.com/200"},
    {name:"Street Cap", brand:"Urban Wear", color:"Black", price:60, rating:3.9, img:"https://via.placeholder.com/200"},
    {name:"Oversized Sweatshirt", brand:"Souled Originals", color:"Blue", price:210, rating:4.6, img:"https://via.placeholder.com/200"},
    {name:"Slim Fit Chinos", brand:"Classic Co.", color:"Black", price:170, rating:4.2, img:"https://via.placeholder.com/200"},
    {name:"Summer Printed Shirt", brand:"Street Mode", color:"White", price:150, rating:4.0, img:"https://via.placeholder.com/200"},
    {name:"Denim Shorts", brand:"Urban Wear", color:"Blue", price:130, rating:3.8, img:"https://via.placeholder.com/200"},
    {name:"Zip-Up Hoodie", brand:"Souled Originals", color:"Black", price:240, rating:4.7, img:"https://via.placeholder.com/200"},
    {name:"Casual Slip-On Shoes", brand:"Classic Co.", color:"White", price:280, rating:4.1, img:"https://via.placeholder.com/200"}
];

function displayProducts(list) {
    const container = document.getElementById("productList");
    container.innerHTML = "";
    list.forEach(p => {
        container.innerHTML += `
            <div class="product">
                <img src="${p.img}">
                <h4>${p.name}</h4>
                <p>${p.brand} | ${p.color}</p>
                <strong>$${p.price}</strong>
                <p>⭐ ${p.rating}</p>
                <button>Add to Cart</button>
            </div>
        `;
    });
}

function updatePrice() {
    document.getElementById("priceValue").textContent = document.getElementById("priceRange").value;
}

function filterProducts() {
    const maxPrice = document.getElementById("priceRange").value;
    const searchText = document.getElementById("searchInput").value.toLowerCase();
    const selectedColors = [...document.querySelectorAll(".color:checked")].map(c => c.value);
    const selectedBrands = [...document.getElementById("brandSelect").selectedOptions].map(o => o.value);
    const rating = document.querySelector("input[name='rating']:checked")?.value || 0;

    const filtered = products.filter(p =>
        p.price <= maxPrice &&
        p.name.toLowerCase().includes(searchText) &&
        (selectedColors.length ? selectedColors.includes(p.color) : true) &&
        (selectedBrands.length ? selectedBrands.includes(p.brand) : true) &&
        p.rating >= rating
    );

    displayProducts(filtered);
}

function sortProducts() {
    const sortValue = document.getElementById("sortSelect").value;
    let sorted = [...products];

    if (sortValue === "low") sorted.sort((a,b) => a.price - b.price);
    if (sortValue === "high") sorted.sort((a,b) => b.price - a.price);

    displayProducts(sorted);
}

displayProducts(products);
</script>

</body>
</html>
